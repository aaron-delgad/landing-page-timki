<div class="min-h-screen bg-gray-50 text-gray-800 font-sans" *ngIf="config() as c">

  <header [style.backgroundColor]="c.color" class="text-white py-16 text-center shadow-md transition-colors duration-500">
    <div class="max-w-4xl mx-auto px-4">
      <h1 class="text-4xl md:text-5xl font-bold mb-2 tracking-tight">Centro de Ayuda</h1>
      <p class="text-lg md:text-xl font-light opacity-90">{{ c.title }}</p>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-12">
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 mb-8">
      <h2 class="text-2xl font-semibold mb-4 text-gray-900">¿Cómo podemos ayudarte hoy?</h2>
      <p class="text-gray-600 mb-6">
        Nuestro equipo técnico de <strong>Nexo Technologies</strong> está disponible para resolver cualquier inconveniente con la plataforma.
      </p>

      <a [href]="'mailto:' + c.email + '?subject=Soporte ' + c.title"
         [style.backgroundColor]="c.color"
         class="inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-lg text-white transition-transform hover:scale-105 duration-200">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
        </svg>
        Contactar Soporte Técnico
      </a>
    </section>

    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <h2 class="text-2xl font-semibold mb-6 text-gray-900">Preguntas Frecuentes</h2>
      <div class="space-y-6">
        <div *ngFor="let faq of c.faqs" class="pb-6 border-b border-gray-100 last:border-0 last:pb-0">
          <h3 class="font-medium text-lg text-gray-800">{{ faq.q }}</h3>
          <p class="text-gray-600 mt-2">{{ faq.a }}</p>
        </div>
      </div>
    </section>
  </main>
</div>
